{% extends 'base.html' %}
{%load static%}
{% block title %}Home - QR Code Generator{% endblock %}

{% block content %}
<div >
    <form method="POST" class = "qr-form" action="{% url 'generate_qr' %}" >
        {% csrf_token %}
        <label for="qr_data">
        
            Enter URL/Text
        </label>
       <input type = "text" placeholder = "www.example.com" required id = "qr_data" name = "qr_data" >
          
        <button type="submit" >
            Generate QR Code
        </button>
    </form>
</div>
       
{% endblock %}
